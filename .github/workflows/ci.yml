name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          components: rustfmt, clippy
      # OpenVMM's reused crates pull mesh -> prost -> protobuf, whose build needs protoc.
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      # The OpenVMM dependency tree is large; cache it so CI stays reasonable.
      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build (release)
        run: cargo build --workspace --release

      - name: Test
        run: cargo test --workspace

      # The committed header is the published contract. Regenerate and fail if it
      # drifted from the Rust source.
      - name: Verify C header is fresh
        shell: pwsh
        run: |
          cargo install cbindgen --locked
          cbindgen --config cbindgen.toml --crate hyperv_virtiofs --output include/hyperv_virtiofs.gen.h
          $committed = (Get-FileHash include/hyperv_virtiofs.h).Hash
          $generated = (Get-FileHash include/hyperv_virtiofs.gen.h).Hash
          if ($committed -ne $generated) {
            git --no-pager diff --no-index include/hyperv_virtiofs.h include/hyperv_virtiofs.gen.h
            Remove-Item include/hyperv_virtiofs.gen.h
            Write-Error "include/hyperv_virtiofs.h is stale. Run cbindgen and commit the result."
            exit 1
          }
          Remove-Item include/hyperv_virtiofs.gen.h

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
      - name: Build (release)
        run: cargo build --release --target x86_64-pc-windows-msvc

      # The release bundle a consumer pins: DLL + import lib + debug symbols +
      # the contract header. Consumers (e.g. Atelier's build-all) fetch this, not source.
      - name: Stage artifacts
        run: |
          $o = "dist"
          New-Item -ItemType Directory -Force $o | Out-Null
          $t = "target/x86_64-pc-windows-msvc/release"
          Copy-Item "$t/hyperv_virtiofs.dll"     $o
          Copy-Item "$t/hyperv_virtiofs.dll.lib" $o
          Copy-Item "$t/hyperv_virtiofs.pdb"     $o -ErrorAction SilentlyContinue
          Copy-Item "include/hyperv_virtiofs.h"  $o
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          # Auto-generate the commit/PR changelog and prepend a short artifact
          # guide so the Release page isn't blank. See CHANGELOG.md for the
          # curated, human-written notes.
          generate_release_notes: true
          body: |
            `hyperv_virtiofs.dll` — virtio-fs over Hyper-V (HDV). C ABI v2.

            **Artifacts**
            - `hyperv_virtiofs.dll` — the library (load it; no `cargo` needed by consumers)
            - `hyperv_virtiofs.dll.lib` — import lib for C/C++ linking
            - `hyperv_virtiofs.pdb` — debug symbols
            - `hyperv_virtiofs.h` — the C ABI contract header

            See [CHANGELOG.md](https://github.com/jlagedo/hyperv-virtiofs/blob/main/CHANGELOG.md)
            for curated notes and [docs/share-abi.md](https://github.com/jlagedo/hyperv-virtiofs/blob/main/docs/share-abi.md)
            for the ABI contract.
