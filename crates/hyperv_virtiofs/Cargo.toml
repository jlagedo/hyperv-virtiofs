[package]
name = "hyperv_virtiofs"
description = "virtiofsd for Hyper-V: a standalone C-ABI DLL that attaches an OpenVMM virtio-fs device to any HCS/Hyper-V guest via HDV."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true

[lib]
# cdylib -> hyperv_virtiofs.dll (+ import .lib + .pdb). rlib so the examples and
# integration tests can link it in-process too.
crate-type = ["cdylib", "rlib"]

[dependencies]
hdv = { path = "../hdv" }
virtio-hdv = { path = "../virtio-hdv" }

# Reused OpenVMM virtio-fs device (FUSE server + Windows NT-backed file ops). This
# is the crate whose reuse avoids reimplementing a virtio-fs server from scratch.
virtiofs.workspace = true
virtio.workspace = true
vmcore.workspace = true
pal_async.workspace = true

serde = { version = "1", features = ["derive"] }
serde_json = "1"

[features]
link-hdv = ["hdv/link-hdv", "virtio-hdv/link-hdv"]

[build-dependencies]
# Header is generated by cbindgen and committed under include/. CI regenerates and
# fails if the committed copy is stale. Kept as a build-dep so `cargo build` alone
# does not require the cbindgen binary on PATH (CI invokes it explicitly).
